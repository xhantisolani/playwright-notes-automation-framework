name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_env:
        description: Environment profile from utils/envProfiles.ts
        default: qa
        required: true
        type: choice
        options:
          - local
          - qa
          - staging
      run_journey:
        description: Include longer business journey tests
        default: false
        required: true
        type: boolean

jobs:
  quality:
    name: Lint And Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test:
    name: ${{ matrix.project }} ${{ matrix.shard_label }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TEST_ENV: ${{ github.event.inputs.test_env || 'qa' }}
      RUN_JOURNEY: ${{ github.event.inputs.run_journey || 'false' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: api
            shard: '1/2'
            shard_label: shard-1-of-2
          - project: api
            shard: '2/2'
            shard_label: shard-2-of-2
          - project: chromium
            shard: '1/2'
            shard_label: shard-1-of-2
          - project: chromium
            shard: '2/2'
            shard_label: shard-2-of-2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: matrix.project == 'chromium'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright shard
        run: npx playwright test --project=${{ matrix.project }} --shard=${{ matrix.shard }}

      - name: Write GitHub summary
        if: always()
        run: npm run report:summary >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}-${{ matrix.shard_label }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.project }}-${{ matrix.shard_label }}
          path: test-results/
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.project }}-${{ matrix.shard_label }}
          path: allure-results/
          retention-days: 14
